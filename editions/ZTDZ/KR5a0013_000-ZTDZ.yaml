body:
  text: 高上玉皇心印經上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃㓨而成迴風混合百日功靈黙朝上帝一紀飛昇知者易悟昩者難行履踐天光呼吸育清岀玄入牝若亡若存綿綿不絶固蔕深根人各有精精合其神神合其氣氣合其眞不得其眞皆是强名神能入石神能飛形入水不溺入火不焚神依形生精依氣盈不凋不殘松柏青青三品一理妙不可聽其聚則有其散則零七竅相通竅竅光明聖日聖月照耀金庭一得永得自然身輕太和充溢骨散寒瓊得丹則靈不得則傾丹在身中非白非青誦之萬徧妙理自明高上玉皇心印經
